<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#4f46e5"/>

  <!-- Microphone body -->
  <rect x="50" y="18" width="28" height="52" rx="14" fill="white" opacity="0.95"/>

  <!-- Microphone stand arc -->
  <path d="M32 62 Q32 96 64 96 Q96 96 96 62" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Microphone stand vertical line -->
  <line x1="64" y1="96" x2="64" y2="110" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Base -->
  <line x1="44" y1="110" x2="84" y2="110" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Recording dot (red indicator) -->
  <circle cx="96" cy="30" r="12" fill="#e53e3e"/>
  <circle cx="96" cy="30" r="6" fill="white"/>
</svg>
